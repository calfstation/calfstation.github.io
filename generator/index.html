<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CALF 글 생성기</title>
<style>
:root{--red:#b22222;--dark:#861417;--gold:#d4af37;--cream:#f8f4e6;--paper:#fffdf8;--ink:#3a1f0b;--line:#e6c9a8;--ok:#21783c;--bad:#c5262d}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.55}.shell{width:min(900px,calc(100% - 24px));margin:18px auto 48px}.hero{text-align:center;padding:24px;background:var(--red);color:#fff;border-bottom:7px solid var(--gold)}.hero h1{margin:0;text-shadow:3px 3px #000}.nav{text-align:center;margin:14px}.nav a{color:var(--red)}.card{padding:22px;background:var(--paper);border:4px solid var(--red);box-shadow:7px 7px var(--gold)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field label{display:block;font-weight:700;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;padding:10px;border:2px solid var(--line);background:#fff;font:inherit}.wide{grid-column:1/-1}.buttons{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0}.btn{padding:10px 14px;color:#fff;background:var(--red);border:2px solid var(--gold);border-radius:6px;cursor:pointer;font-weight:700}.btn:disabled{opacity:.45}.status{padding:10px 12px;border:2px solid var(--line);background:#fff}.output{min-height:150px;font-family:ui-monospace,Consolas,monospace;white-space:pre-wrap}.ok{color:var(--ok)}.bad{color:var(--bad)}@media(max-width:650px){.grid{grid-template-columns:1fr}.wide{grid-column:auto}.card{padding:15px}}
</style></head>
<body><main class="shell"><header class="hero"><h1>CALF 글 생성기</h1><p>CRC32 계산 · IPS 검사 · 난수 파일명 · 티스토리 설정 생성</p></header><div class="nav"><a href="../">← 웹 패처로 돌아가기</a></div>
<section class="card"><div class="grid">
<div class="field wide"><label>게임명</label><input id="title" value="열혈고교 피구부"></div>
<div class="field"><label>기종</label><input id="platform" value="FC / 패미컴"></div><div class="field"><label>패치 버전</label><input id="version" value="v1.0"></div>
<div class="field"><label>원본 기준</label><input id="original" value="일본판"></div><div class="field"><label>출력 파일명</label><input id="output" value="Nekketsu_Dodgeball_KR"></div>
<div class="field"><label>제작자</label><input id="author" value="CALF STATION"></div><div class="field"><label>공개일</label><input id="date" type="date"></div>
<div class="field"><label>클린 원본 파일(CRC32 계산용)</label><input id="rom" type="file"></div><div class="field"><label>IPS 패치 파일</label><input id="patch" type="file" accept=".ips,.bin,.dat"></div>
<div class="field"><label>원본 CRC32</label><input id="crc" maxlength="8" placeholder="원본 선택 시 자동 계산"></div><div class="field"><label>배포용 난수 파일명</label><input id="randomName" readonly></div>
</div>
<div class="buttons"><button class="btn" id="inspect">검사 및 생성</button><button class="btn" id="downloadPatch" disabled>난수명 패치 다운로드</button><button class="btn" id="copySnippet" disabled>서식 코드 복사</button><button class="btn" id="copyUrl" disabled>패처 주소 복사</button></div>
<div class="status" id="status">원본과 IPS 파일을 선택하세요.</div>
<h2>티스토리 자동 렌더러용 설정 블록</h2><textarea class="output" id="snippet" readonly></textarea>
<h2>직접 패처 주소</h2><textarea class="output" id="patcherUrl" readonly style="min-height:90px"></textarea>
</section></main>
<script>
(function(){'use strict';const $=id=>document.getElementById(id);let patchFile=null;const table=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0}return t})();function crc32(b){let c=0xFFFFFFFF;for(const v of b)c=table[(c^v)&255]^(c>>>8);return((c^0xFFFFFFFF)>>>0).toString(16).toUpperCase().padStart(8,'0')}function text(b,p,n){let s='';for(let i=0;i<n;i++)s+=String.fromCharCode(b[p+i]);return s}function validateIps(b){if(b.length<8||text(b,0,5)!=='PATCH')throw Error('IPS 헤더(PATCH)가 없습니다.');let p=5,eof=false;while(p+3<=b.length){if(text(b,p,3)==='EOF'){eof=true;break}p+=3;if(p+2>b.length)throw Error('레코드 손상');const size=(b[p]<<8)|b[p+1];p+=2;if(size===0){if(p+3>b.length)throw Error('RLE 손상');p+=3}else{if(p+size>b.length)throw Error('데이터 손상');p+=size}}if(!eof)throw Error('EOF가 없습니다.')}function rnd(){const a=new Uint8Array(4);crypto.getRandomValues(a);return[...a].map(v=>v.toString(16).padStart(2,'0')).join('')}function escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}function q(s){return encodeURIComponent(s)}
$('date').value=new Date().toISOString().slice(0,10);$('randomName').value='cfs_'+$('date').value.replace(/-/g,'')+'_'+rnd()+'.bin';$('rom').addEventListener('change',async()=>{const f=$('rom').files[0];if(!f)return;const b=new Uint8Array(await f.arrayBuffer());$('crc').value=crc32(b)});$('patch').addEventListener('change',()=>{patchFile=$('patch').files[0]||null});
$('inspect').addEventListener('click',async()=>{try{const f=$('patch').files[0];if(!f)throw Error('IPS 패치 파일을 선택하세요.');const b=new Uint8Array(await f.arrayBuffer());validateIps(b);patchFile=f;if(!$('randomName').value)$('randomName').value='cfs_'+$('date').value.replace(/-/g,'')+'_'+rnd()+'.bin';const title=$('title').value.trim(),platform=$('platform').value.trim(),version=$('version').value.trim(),original=$('original').value.trim(),output=$('output').value.trim(),author=$('author').value.trim(),date=$('date').value,crc=$('crc').value.trim().toUpperCase(),fn=$('randomName').value.trim();const patchUrl='https://calfstation.github.io/patches/'+fn;const direct='https://calfstation.github.io/?patch='+q('patches/'+fn)+'&title='+q(title)+'&version='+q(version)+'&original='+q(original)+'&crc='+q(crc)+'&out='+q(output);const snippet='<div\n  class="calf-patch-auto"\n  data-title="'+escAttr(title)+'"\n  data-platform="'+escAttr(platform)+'"\n  data-version="'+escAttr(version)+'"\n  data-original="'+escAttr(original)+'"\n  data-crc32="'+escAttr(crc)+'"\n  data-patch-url="'+escAttr(patchUrl)+'"\n  data-patch-name="'+escAttr(title+' 한국어 패치 '+version)+'"\n  data-output-name="'+escAttr(output)+'"\n  data-author="'+escAttr(author)+'"\n  data-date="'+escAttr(date)+'"\n></div>';$('snippet').value=snippet;$('patcherUrl').value=direct;$('downloadPatch').disabled=false;$('copySnippet').disabled=false;$('copyUrl').disabled=false;$('status').className='status ok';$('status').textContent='IPS 정상 · CRC32 '+(crc||'미입력')+' · '+fn+' 생성 준비 완료'}catch(e){$('status').className='status bad';$('status').textContent='오류: '+e.message}});
$('downloadPatch').addEventListener('click',async()=>{if(!patchFile)return;const a=document.createElement('a');a.href=URL.createObjectURL(patchFile);a.download=$('randomName').value;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)});$('copySnippet').addEventListener('click',()=>navigator.clipboard.writeText($('snippet').value));$('copyUrl').addEventListener('click',()=>navigator.clipboard.writeText($('patcherUrl').value));
})();
</script></body></html>
